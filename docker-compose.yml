services:
  postgres:
    image: postgres:16-alpine
    container_name: zenvora-invite-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: zenvora
      POSTGRES_PASSWORD: zenvora
      POSTGRES_DB: zenvora_invite
    ports:
      - "5434:5432"
    volumes:
      - zenvora_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zenvora -d zenvora_invite"]
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
  zenvora_postgres:
